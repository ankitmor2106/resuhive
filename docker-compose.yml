version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: resuhive_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    image: ghcr.io/ankitmor2106/resuhive:latest
    container_name: resuhive_backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
