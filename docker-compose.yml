version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: resumate_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: resume_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumate_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:mysecretpassword@postgres:5432/resume_platform?schema=public
      - JWT_SECRET=super_secret_jwt_key_please_change
      - FRONTEND_URL=https://your-vercel-frontend-url.vercel.app
      - S3_BUCKET=your_s3_bucket
      - AWS_REGION=your_aws_region
      - AWS_ACCESS_KEY_ID=your_access_key
      - AWS_SECRET_ACCESS_KEY=your_secret_key
    depends_on:
      - postgres

volumes:
  pgdata:
